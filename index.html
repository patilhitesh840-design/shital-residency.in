<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shital Residency - Premium Society Management System (Demo)</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS v3 CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        glass: {
                            light: 'rgba(255, 255, 255, 0.45)',
                            dark: 'rgba(15, 23, 42, 0.45)',
                            border: {
                                light: 'rgba(255, 255, 255, 0.25)',
                                dark: 'rgba(255, 255, 255, 0.08)'
                            }
                        },
                        premium: {
                            gold: '#D4AF37',
                            platinum: '#E5E4E2',
                            primary: '#6366f1',
                            secondary: '#a855f7',
                            accent: '#ec4899',
                            darkBg: '#090d16',
                            lightBg: '#f8fafc'
                        }
                    },
                    boxShadow: {
                        'glass-light': '0 8px 32px 0 rgba(31, 38, 135, 0.08)',
                        'glass-dark': '0 8px 32px 0 rgba(0, 0, 0, 0.37)',
                        'glow-primary': '0 0 20px rgba(99, 102, 241, 0.25)',
                        'glow-secondary': '0 0 20px rgba(168, 85, 247, 0.25)'
                    },
                    backdropBlur: {
                        'glass': '16px',
                    }
                }
            }
        }
    </script>
    
    <!-- Premium UI Custom Styling -->
    <style>
        /* Custom Animations */
        @keyframes blob {
            0%, 100% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.95); }
        }
        @keyframes spin-reverse {
            0% { transform: rotate(360deg); }
            100% { transform: rotate(0deg); }
        }
        .animate-blob { animation: blob 10s infinite alternate ease-in-out; }
        .animate-spin-reverse { animation: spin-reverse 1.5s linear infinite; }
        .animation-delay-2000 { animation-delay: 2s; }
        .animation-delay-4000 { animation-delay: 4s; }

        /* Glassmorphism Styles */
        .glass-panel {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.06);
            transition: background 0.3s, border-color 0.3s;
        }
        .dark .glass-panel {
            background: rgba(15, 23, 42, 0.45);
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }
        .premium-card { transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .premium-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.12);
        }
        .dark .premium-card:hover {
            border-color: rgba(99, 102, 241, 0.3);
            box-shadow: 0 20px 40px rgba(99, 102, 241, 0.1), 0 0 20px rgba(99, 102, 241, 0.15);
        }

        /* 3D Card Flip */
        .perspective-1000 { perspective: 1000px; }
        .preserve-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; -webkit-backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }

        /* Scrollbars */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(99, 102, 241, 0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(99, 102, 241, 0.4); }

        /* Glow Elements */
        .text-gradient {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .glow-btn { position: relative; overflow: hidden; z-index: 1; }
        .glow-btn::before {
            content: ''; position: absolute; top: 0; left: 0; width: 200%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transform: skewX(-20deg) translateX(-100%); transition: transform 0.6s ease; z-index: -1;
        }
        .glow-btn:hover::before { transform: skewX(-20deg) translateX(100%); }

        /* Inputs */
        .glass-input {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.3);
            outline: none; transition: all 0.3s ease;
        }
        .dark .glass-input {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .glass-input:focus {
            border-color: #6366f1; box-shadow: 0 0 10px rgba(99, 102, 241, 0.2);
        }
        .dark .glass-input:focus {
            border-color: #818cf8; box-shadow: 0 0 10px rgba(129, 140, 248, 0.15);
        }
    </style>
    
    <!-- Dependencies (Chart.js, SheetJS, jsPDF, Lucide) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 dark:bg-[#090d16] text-slate-800 dark:text-slate-100 font-sans transition-colors duration-500 min-h-screen overflow-x-hidden relative flex flex-col justify-between">
    
    <!-- Dynamic Glowing Ambient Background Blobs -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <div class="absolute -top-[20%] -left-[10%] w-[60%] h-[60%] rounded-full bg-indigo-900/20 blur-[120px] dark:block hidden animate-blob"></div>
        <div class="absolute -bottom-[20%] -right-[10%] w-[60%] h-[60%] rounded-full bg-purple-900/20 blur-[120px] dark:block hidden animate-blob animation-delay-2000"></div>
        <div class="absolute top-[30%] left-[40%] w-[40%] h-[40%] rounded-full bg-pink-900/10 blur-[100px] dark:block hidden animate-blob animation-delay-4000"></div>
        <div class="absolute -top-[20%] -left-[10%] w-[60%] h-[60%] rounded-full bg-indigo-200/40 blur-[120px] dark:hidden block animate-blob"></div>
        <div class="absolute -bottom-[20%] -right-[10%] w-[60%] h-[60%] rounded-full bg-purple-200/40 blur-[120px] dark:hidden block animate-blob animation-delay-2000"></div>
    </div>

    <!-- Toast Notification Overlay -->
    <div id="toast-container" class="fixed top-5 right-5 z-50 flex flex-col gap-3 max-w-sm pointer-events-none"></div>

    <!-- SPA Target -->
    <main id="app" class="relative z-10 w-full flex-grow flex flex-col"></main>

    <!-- Modals Host -->
    <div id="modal-container"></div>

    <!-- Core App Logic Script -->
    <script>
        // ==========================================
        // 1. DATA SEEDING & LOCAL STORAGE ENGINE
        // ==========================================
        const MOCK_STORAGE_KEY_MEMBERS = 'gd_demo_members';
        const MOCK_STORAGE_KEY_BILLS = 'gd_demo_bills';
        const MOCK_STORAGE_KEY_COMPLAINTS = 'gd_demo_complaints';
        const MOCK_STORAGE_KEY_SESSION = 'gd_demo_session';
        const MOCK_STORAGE_KEY_THEME = 'gd_demo_theme';
        const MOCK_STORAGE_KEY_ADMINS = 'gd_demo_admins';

        const INITIAL_ADMINS = [
            { id: 'a1', name: 'Society Admin', email: 'admin@society.com', password: 'admin123', role: 'admin' }
        ];

                const INITIAL_MEMBERS = [];

        const INITIAL_BILLS = [];

        const INITIAL_COMPLAINTS = [];

        function seedDB() {
            if (localStorage.getItem('granddome_data_ver_2026') !== 'cleared') {
                localStorage.removeItem(MOCK_STORAGE_KEY_MEMBERS);
                localStorage.removeItem(MOCK_STORAGE_KEY_BILLS);
                localStorage.removeItem(MOCK_STORAGE_KEY_COMPLAINTS);
                localStorage.setItem('granddome_data_ver_2026', 'cleared');
            }
            if (!localStorage.getItem(MOCK_STORAGE_KEY_MEMBERS)) localStorage.setItem(MOCK_STORAGE_KEY_MEMBERS, JSON.stringify(INITIAL_MEMBERS));
            if (!localStorage.getItem(MOCK_STORAGE_KEY_BILLS)) localStorage.setItem(MOCK_STORAGE_KEY_BILLS, JSON.stringify(INITIAL_BILLS));
            if (!localStorage.getItem(MOCK_STORAGE_KEY_COMPLAINTS)) localStorage.setItem(MOCK_STORAGE_KEY_COMPLAINTS, JSON.stringify(INITIAL_COMPLAINTS));
            if (!localStorage.getItem(MOCK_STORAGE_KEY_ADMINS)) localStorage.setItem(MOCK_STORAGE_KEY_ADMINS, JSON.stringify(INITIAL_ADMINS));
        }
        seedDB();

        const getDB = (key) => JSON.parse(localStorage.getItem(key)) || [];
        const saveDB = (key, data) => localStorage.setItem(key, JSON.stringify(data));

        // ==========================================
        // 2. THEME AND TOAST SYSTEM
        // ==========================================
        function initTheme() {
            const stored = localStorage.getItem(MOCK_STORAGE_KEY_THEME) || 'dark';
            document.documentElement.className = stored;
        }
        
        function toggleTheme() {
            const isDark = document.documentElement.classList.contains('dark');
            const target = isDark ? 'light' : 'dark';
            document.documentElement.className = target;
            localStorage.setItem(MOCK_STORAGE_KEY_THEME, target);
            showToast(`Theme switched to ${target}`, 'info');
            
            // Re-render current page to align styles
            resolveRoute();
        }

        function showToast(msg, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `flex items-center gap-3 p-4 rounded-xl glass-panel shadow-lg border text-sm transition-all duration-500 translate-x-12 opacity-0 select-none pointer-events-auto border-${type === 'error' ? 'red' : type === 'warning' ? 'yellow' : 'green'}-500/30`;
            
            let icon = 'check-circle';
            let color = 'text-green-500';
            if (type === 'error') { icon = 'alert-triangle'; color = 'text-red-500'; }
            if (type === 'info') { icon = 'info'; color = 'text-indigo-500'; }

            toast.innerHTML = `
                <i data-lucide="${icon}" class="${color} w-5 h-5 flex-shrink-0 animate-bounce"></i>
                <span class="font-medium">${msg}</span>
            `;
            container.appendChild(toast);
            lucide.createIcons();
            
            setTimeout(() => toast.classList.remove('translate-x-12', 'opacity-0'), 50);
            setTimeout(() => {
                toast.classList.add('translate-x-12', 'opacity-0');
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }

        // ==========================================
        // 3. AUTHENTICATION & SESSION GUARDS
        // ==========================================
        const auth = {
            getCurrentUser: () => JSON.parse(localStorage.getItem(MOCK_STORAGE_KEY_SESSION)),
            login: (email, password) => {
                const mail = email.trim().toLowerCase();
                const admins = getDB(MOCK_STORAGE_KEY_ADMINS);
                const admin = admins.find(a => a.email.toLowerCase() === mail);
                if (admin && password === admin.password) {
                    const session = { email: mail, role: 'admin', name: admin.name };
                    localStorage.setItem(MOCK_STORAGE_KEY_SESSION, JSON.stringify(session));
                    return session;
                }
                const members = getDB(MOCK_STORAGE_KEY_MEMBERS);
                const res = members.find(m => m.email.toLowerCase() === mail || m.flatNo === email.trim());
                if (res && password === (res.password || 'resident123')) {
                    const session = { ...res, role: 'resident' };
                    localStorage.setItem(MOCK_STORAGE_KEY_SESSION, JSON.stringify(session));
                    return session;
                }
                throw new Error('Invalid Credentials! Try: admin@society.com/admin123 or resident@society.com/resident123');
            },
            logout: () => {
                localStorage.removeItem(MOCK_STORAGE_KEY_SESSION);
                showToast('Logged out successfully', 'info');
                navigate('#/login');
            }
        };

        // ==========================================
        // 4. CLIENT SIDE ROUTER
        // ==========================================
        function navigate(hash) { window.location.hash = hash; }
        window.addEventListener('hashchange', resolveRoute);

        function resolveRoute() {
            const hash = window.location.hash || '#/login';
            const user = auth.getCurrentUser();

            if (hash !== '#/login' && !user) { navigate('#/login'); return; }
            if (hash === '#/login' && user) { navigate(user.role === 'admin' ? '#/admin' : '#/resident'); return; }
            if (hash === '#/admin' && user.role !== 'admin') { navigate('#/resident'); return; }
            if (hash === '#/resident' && user.role !== 'resident') { navigate('#/admin'); return; }

            const app = document.getElementById('app');
            if (hash === '#/login') renderLogin(app);
            if (hash === '#/admin') renderAdmin(app);
            if (hash === '#/resident') renderResident(app);
        }

        // ==========================================
        // 5. GLOBAL HEADER COMPONENT
        // ==========================================
        function getHeaderHtml() {
            const user = auth.getCurrentUser();
            return `
                <header class="w-full glass-panel sticky top-0 z-40 border-b border-glass-border-light dark:border-glass-border-dark px-6 py-4 flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-xl bg-white flex items-center justify-center shadow-md overflow-hidden p-0.5 border border-slate-200 dark:border-slate-800">
                            <img src="logo.png" alt="Shital Residency Logo" class="w-full h-full object-contain">
                        </div>
                        <div>
                            <h1 class="text-xl font-display font-bold bg-gradient-to-r from-indigo-400 to-purple-500 bg-clip-text text-transparent">Shital Residency</h1>
                            <p class="text-[10px] uppercase tracking-widest font-semibold text-indigo-400/80 -mt-1">Society Management</p>
                        </div>
                        <span class="ml-3 px-2 py-0.5 rounded-full text-[9px] font-bold bg-amber-500/10 border border-amber-500/30 text-amber-500 uppercase tracking-wider animate-pulse flex items-center gap-1">
                            <span class="w-1.5 h-1.5 rounded-full bg-amber-500"></span> Sandbox Demo
                        </span>
                    </div>
                    
                    <div class="flex items-center gap-4">
                        <button onclick="toggleTheme()" class="w-10 h-10 rounded-xl glass-panel hover:bg-slate-200 dark:hover:bg-slate-800 transition-all flex items-center justify-center border border-glass-border-light dark:border-glass-border-dark">
                            <i data-lucide="sun" class="w-5 h-5 text-amber-400 dark:hidden"></i>
                            <i data-lucide="moon" class="w-5 h-5 text-indigo-400 dark:block hidden"></i>
                        </button>
                        
                        <div class="flex items-center gap-3 pl-4 border-l border-glass-border-light dark:border-glass-border-dark relative">
                            <div class="hidden sm:block text-right">
                                <h4 class="text-sm font-semibold">${user.name}</h4>
                                <p class="text-[11px] text-slate-400">${user.role === 'admin' ? 'Administrator' : `Flat ${user.building}-${user.flatNo}`}</p>
                            </div>
                            <button id="profile-btn" onclick="toggleProfileDropdown(event)" class="w-10 h-10 rounded-full bg-indigo-500/10 border-2 border-indigo-500/30 flex items-center justify-center font-bold text-indigo-400">
                                ${user.name.charAt(0)}
                            </button>
                            <div id="profile-dropdown" class="hidden absolute right-0 top-12 mt-2 w-48 rounded-xl glass-panel border border-glass-border-light dark:border-glass-border-dark p-2 shadow-xl z-50">
                                <button onclick="auth.logout()" class="w-full text-left flex items-center gap-2 p-2 rounded-lg text-red-500 hover:bg-red-500/10 transition-colors">
                                    <i data-lucide="log-out" class="w-4 h-4"></i>
                                    <span class="text-xs font-semibold">Logout</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </header>
            `;
        }

        function toggleProfileDropdown(e) {
            e.stopPropagation();
            const dropdown = document.getElementById('profile-dropdown');
            dropdown.classList.toggle('hidden');
        }
        document.addEventListener('click', () => {
            const d = document.getElementById('profile-dropdown');
            if (d) d.classList.add('hidden');
        });

        // ==========================================
        // 6. LOGIN PAGE VIEW
        // ==========================================
        function renderLogin(container) {
            container.innerHTML = `
                <div class="flex-grow flex flex-col items-center justify-center min-h-[90vh] px-4 py-12">
                    <div class="flex flex-col items-center gap-2 mb-8 animate-fade-in">
                        <div class="w-16 h-16 rounded-2xl bg-white flex items-center justify-center shadow-md overflow-hidden p-1 border border-slate-200 dark:border-slate-800">
                            <img src="logo.png" alt="Shital Residency Logo" class="w-full h-full object-contain">
                        </div>
                        <h1 class="text-3xl font-display font-extrabold text-gradient tracking-tight">Shital Residency</h1>
                        <p class="text-xs uppercase tracking-widest text-slate-400 font-semibold -mt-1">Society Management Portal</p>
                    </div>

                    <div class="w-full max-w-md perspective-1000 h-[530px]">
                        <div id="flip-card" class="relative w-full h-full duration-700 preserve-3d">
                            
                            <!-- Admin login side -->
                            <div class="absolute inset-0 w-full h-full backface-hidden glass-panel border border-glass-border-light dark:border-glass-border-dark rounded-3xl p-8 flex flex-col justify-between shadow-2xl">
                                <form onsubmit="handleAuthSubmit(event, 'admin')" class="space-y-4">
                                    <div class="flex items-center justify-between mb-4">
                                        <h2 class="text-2xl font-display font-bold">Admin Portal</h2>
                                        <span class="px-2 py-0.5 rounded text-[9px] font-bold bg-indigo-500/10 border border-indigo-500/30 text-indigo-400">STAFF</span>
                                    </div>
                                    <div class="space-y-1">
                                        <label class="text-xs font-semibold text-slate-400">Email Address</label>
                                        <input type="email" id="admin-email" placeholder="admin@society.com" required class="w-full px-4 py-2.5 rounded-xl glass-input text-sm">
                                    </div>
                                    <div class="space-y-1">
                                        <label class="text-xs font-semibold text-slate-400">Access Password</label>
                                        <input type="password" id="admin-password" placeholder="••••••••" required class="w-full px-4 py-2.5 rounded-xl glass-input text-sm">
                                    </div>
                                    <div class="text-right -mt-1">
                                        <button type="button" onclick="openForgotPasswordModal('admin')" class="text-[11px] text-indigo-400 hover:underline focus:outline-none">Forgot Password?</button>
                                    </div>
                                    <button type="submit" class="w-full py-3 rounded-xl bg-gradient-to-r from-indigo-500 to-purple-600 text-white font-semibold text-sm shadow-md transition-all glow-btn">
                                        Authorize Staff Access
                                    </button>
                                </form>
                                <div class="text-center mt-2">
                                    <span class="text-xs text-slate-400">New staff?</span>
                                    <button type="button" onclick="openAdminSignupModal()" class="text-xs text-indigo-400 font-bold hover:underline focus:outline-none ml-1">Create Staff Account</button>
                                </div>
                                <div class="text-center pt-4 border-t border-glass-border-light dark:border-glass-border-dark">
                                    <button onclick="flipCard(true)" class="text-xs text-indigo-400 font-bold hover:underline">Switch to Resident Login →</button>
                                </div>
                            </div>
 
                            <!-- Resident login side -->
                            <div class="absolute inset-0 w-full h-full backface-hidden rotate-y-180 glass-panel border border-glass-border-light dark:border-glass-border-dark rounded-3xl p-8 flex flex-col justify-between shadow-2xl">
                                <form onsubmit="handleAuthSubmit(event, 'resident')" class="space-y-4">
                                    <div class="flex items-center justify-between mb-4">
                                        <h2 class="text-2xl font-display font-bold">Resident Portal</h2>
                                        <span class="px-2 py-0.5 rounded text-[9px] font-bold bg-purple-500/10 border border-purple-500/30 text-purple-400">HOME</span>
                                    </div>
                                    <div class="space-y-1">
                                        <label class="text-xs font-semibold text-slate-400">Flat No. or Email</label>
                                        <input type="text" id="res-username" placeholder="e.g. 201 or resident@society.com" required class="w-full px-4 py-2.5 rounded-xl glass-input text-sm">
                                    </div>
                                    <div class="space-y-1">
                                        <label class="text-xs font-semibold text-slate-400">Access Key</label>
                                        <input type="password" id="res-password" placeholder="••••••••" required class="w-full px-4 py-2.5 rounded-xl glass-input text-sm">
                                    </div>
                                    <div class="text-right -mt-1">
                                        <button type="button" onclick="openForgotPasswordModal('resident')" class="text-[11px] text-purple-400 hover:underline focus:outline-none">Forgot Password?</button>
                                    </div>
                                    <button type="submit" class="w-full py-3 rounded-xl bg-gradient-to-r from-purple-500 to-pink-600 text-white font-semibold text-sm shadow-md transition-all glow-btn">
                                        Verify Resident Identity
                                    </button>
                                </form>
                                <div class="text-center mt-2">
                                    <span class="text-xs text-slate-400">New Resident?</span>
                                    <button type="button" onclick="openSignupModal()" class="text-xs text-pink-400 font-bold hover:underline focus:outline-none ml-1">Create Account</button>
                                </div>
                                <div class="text-center pt-4 border-t border-glass-border-light dark:border-glass-border-dark">
                                    <button onclick="flipCard(false)" class="text-xs text-purple-400 font-bold hover:underline">← Switch to Admin Login</button>
                                </div>
                            </div>
 
                        </div>
                    </div>   </div>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        function flipCard(toResident) {
            const card = document.getElementById('flip-card');
            if (toResident) card.classList.add('rotate-y-180');
            else card.classList.remove('rotate-y-180');
        }

        function handleAuthSubmit(e, role) {
            e.preventDefault();
            try {
                if (role === 'admin') {
                    const email = document.getElementById('admin-email').value;
                    const pass = document.getElementById('admin-password').value;
                    auth.login(email, pass);
                    showToast('Admin Authorized!', 'success');
                    navigate('#/admin');
                } else {
                    const user = document.getElementById('res-username').value;
                    const pass = document.getElementById('res-password').value;
                    auth.login(user, pass);
                    showToast('Resident Verified!', 'success');
                    navigate('#/resident');
                }
            } catch (err) {
                showToast(err.message, 'error');
            }
        }

        function openSignupModal() {
            const container = document.getElementById('modal-container');
            container.innerHTML = `
                <div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/60 backdrop-blur-sm">
                    <div class="w-full max-w-md glass-panel rounded-2xl shadow-2xl p-6 relative z-50">
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="text-md font-bold font-display text-gradient">Resident Registration</h3>
                            <button onclick="closeModal()" class="text-slate-400 hover:text-slate-200"><i data-lucide="x" class="w-5 h-5"></i></button>
                        </div>
                        
                        <form onsubmit="handleSignupSubmit(event)" class="space-y-4 text-xs">

        function handleSignupSubmit(e) {
            e.preventDefault();

            const password = document.getElementById('s-password').value;

            if (members.some(m => m.flatNo === flat)) {
                showToast(`Plot ${flat} is already registered!`, 'error');
                return;
            }
            if (members.some(m => m.email.toLowerCase() === email.toLowerCase())) {
                showToast(`Email ${email} is already in use!`, 'error');
                return;
            }

            const newResident = {
                id: 'm_' + Date.now(),
                building: bld,
                flatNo: flat,
                name: name,
                phone: phone,
                email: email,
                status: status,

                password: password,
                joinDate: new Date().toISOString().split('T')[0]
            };

            members.push(newResident);
            saveDB(MOCK_STORAGE_KEY_MEMBERS, members);

        function handleForgotPasswordVerify(e, role) {
            e.preventDefault();
            const email = document.getElementById('fp-email').value.trim().toLowerCase();
            
            let exists = false;
            if (role === 'admin') {
                const admins = getDB(MOCK_STORAGE_KEY_ADMINS);
                exists = admins.some(a => a.email.toLowerCase() === email);
            } else {
                const members = getDB(MOCK_STORAGE_KEY_MEMBERS);
                exists = members.some(m => m.email.toLowerCase() === email);
            }

            if (!exists) {
                showToast('Email address not found in system registers!', 'error');
                return;
            }

            document.getElementById('fp-email-step').classList.add('hidden');
            document.getElementById('fp-reset-step').classList.remove('hidden');
            document.getElementById('fp-verified-email').value = email;
        }

        function handleForgotPasswordReset(e, role) {
            e.preventDefault();
            const email = document.getElementById('fp-verified-email').value;

            if (role === 'admin') {
                const admins = getDB(MOCK_STORAGE_KEY_ADMINS);
                const idx = admins.findIndex(a => a.email.toLowerCase() === email);
                admins[idx].password = newPassword;
                saveDB(MOCK_STORAGE_KEY_ADMINS, admins);
            } else {
                const members = getDB(MOCK_STORAGE_KEY_MEMBERS);
                const idx = members.findIndex(m => m.email.toLowerCase() === email);
                members[idx].password = newPassword;
                saveDB(MOCK_STORAGE_KEY_MEMBERS, members);
            }

            showToast('Password updated! Please log in.', 'success');
            closeModal();

        function calculateStats() {
            const members = getDB(MOCK_STORAGE_KEY_MEMBERS);
            const bills = getDB(MOCK_STORAGE_KEY_BILLS);

            const totalIncome = bills.filter(b => b.status === 'Paid').reduce((s,b) => s + b.total, 0);
            const totalOutstanding = bills.filter(b => b.status === 'Pending').reduce((s,b) => s + b.total, 0);
            const totalPenalties = bills.reduce((s,b) => s + b.lateFee, 0);
            const pendingCount = bills.filter(b => b.status === 'Pending').length;

            const monthlyMap = {};
            bills.forEach(b => {
                if (!monthlyMap[b.month]) monthlyMap[b.month] = { income: 0, pending: 0 };
                if (b.status === 'Paid') monthlyMap[b.month].income += b.total;
                else monthlyMap[b.month].pending += b.total;
            });

            const months = Object.keys(monthlyMap);
            const incomeHistory = months.map(m => monthlyMap[m].income);
            const outstandingHistory = months.map(m => monthlyMap[m].pending);

            return {
                membersCount: members.length,
                totalIncome,
                totalOutstanding,
                totalPenalties,
                pendingCount,
                months,
                incomeHistory,
                outstandingHistory,
                rawHistory: monthlyMap
            };
        }

        function filterMembers() {
            const members = getDB(MOCK_STORAGE_KEY_MEMBERS);
            const query = document.getElementById('member-search').value.toLowerCase();
            const role = document.getElementById('member-filter-status').value;
            const tbody = document.getElementById('members-tbody');

            const filtered = members.filter(m => {
                const matchesSearch = m.name.toLowerCase().includes(query) || m.flatNo.includes(query) || m.phone.includes(query);
                const matchesRole = !role || m.status === role;
                return matchesSearch && matchesRole;
            });

            if (filtered.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="px-6 py-8 text-center text-slate-400 italic">No matches found.</td></tr>`;
                return;
            }

            tbody.innerHTML = filtered.map(m => `

                    <td class="px-6 py-3"><span class="px-2 py-0.5 rounded bg-indigo-500/10 text-indigo-400 font-bold">${m.building ? m.building + '-' : 'Plot '}${m.flatNo}</span></td>

        function closeModal() { document.getElementById('modal-container').innerHTML = ''; }

        function handleMemberSubmit(e, id) {
            e.preventDefault();
            const members = getDB(MOCK_STORAGE_KEY_MEMBERS);
            
            const data = {
                building: "",
                flatNo: document.getElementById('m-flat').value.trim(),
                name: document.getElementById('m-name').value.trim(),
                phone: document.getElementById('m-phone').value.trim(),
                email: document.getElementById('m-email').value.trim(),
                status: document.getElementById('m-status').value,
                membersCount: parseInt(document.getElementById('m-count').value, 10)
            };

            if (id) {
                const index = members.findIndex(m => m.id === id);
                members[index] = { ...members[index], ...data };
                saveDB(MOCK_STORAGE_KEY_MEMBERS, members);
                showToast('Resident profile saved!', 'success');
            } else {
                if (members.some(m => m.flatNo === data.flatNo)) {
                    showToast(`Plot ${data.flatNo} is already registered!`, 'error');
                    return;
                }
                const newM = {
                    id: 'm_' + Date.now(),
                    joinDate: new Date().toISOString().split('T')[0],
                    ...data
                };
                members.push(newM);
                saveDB(MOCK_STORAGE_KEY_MEMBERS, members);
                showToast('Resident registered!', 'success');
            }
            closeModal();
            loadAdminMembers(document.getElementById('admin-main-pane'));
        }

        function markBillPaid(id) {
            const method = prompt('Specify payment route (UPI, Cash, NetBanking, Card):', 'UPI');
            if (method !== null) {
                const bills = getDB(MOCK_STORAGE_KEY_BILLS);
                const idx = bills.findIndex(b => b.id === id);
                bills[idx].status = 'Paid';
                bills[idx].paymentDate = new Date().toISOString().split('T')[0];
                bills[idx].paymentMethod = method || 'Cash';
                saveDB(MOCK_STORAGE_KEY_BILLS, bills);
                showToast('Dues invoice marked Paid!', 'success');
                refreshBillsTable();
            }

                const bills = getDB(MOCK_STORAGE_KEY_BILLS);
                const idx = bills.findIndex(b => b.id === id);
                bills[idx].status = 'Pending';
                bills[idx].paymentDate = null;
                bills[idx].paymentMethod = null;
                saveDB(MOCK_STORAGE_KEY_BILLS, bills);
                showToast('Dues invoice reset to pending', 'info');
                refreshBillsTable();
            }

- Management Office`;

        function handleBillSubmit(e) {
            e.preventDefault();
            const target = document.getElementById('b-target').value;
            const bills = getDB(MOCK_STORAGE_KEY_BILLS);
            const members = getDB(MOCK_STORAGE_KEY_MEMBERS);

            const billInfo = {
                month: document.getElementById('b-month').value.trim(),
                electricity: Number(document.getElementById('b-elec').value),
                garbage: Number(document.getElementById('b-garb').value),
                maintenance: Number(document.getElementById('b-maint').value),
                lateFee: Number(document.getElementById('b-penalty').value),
                dueDate: document.getElementById('b-due').value,
                status: 'Pending',
                paymentDate: null,
                paymentMethod: null
            };
            billInfo.total = billInfo.electricity + billInfo.garbage + billInfo.maintenance + billInfo.lateFee;

            if (target === 'ALL') {
                members.forEach((m, idx) => {
                    bills.unshift({
                        id: 'b_dist_' + Date.now() + '_' + idx,
                        flatNo: m.flatNo,
                        ...billInfo
                    });
                });

            } else {
                bills.unshift({
                    id: 'b_indiv_' + Date.now(),
                    flatNo: target,
                    ...billInfo
                });
                showToast(`Invoice posted to Flat ${target}`, 'success');
            }

            saveDB(MOCK_STORAGE_KEY_BILLS, bills);
            closeModal();
            loadAdminBilling(document.getElementById('admin-main-pane'));

        function importExcel(e) {
            if (!window.XLSX) { showToast('Excel library offline', 'error'); return; }
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(evt) {
                try {
                    const data = new Uint8Array(evt.target.result);
                    const wb = XLSX.read(data, { type: 'array' });
                    const sheet = wb.Sheets[wb.SheetNames[0]];
                    const json = XLSX.utils.sheet_to_json(sheet);
                    
                    if (json && json.length > 0) {
                        const current = getDB(MOCK_STORAGE_KEY_MEMBERS);
                        let imported = 0;
                        json.forEach((m, idx) => {
                            const flat = String(m.flatNo || m.Flat || '').trim();
                            const name = String(m.name || m.Name || '').trim();
                            if (name && flat) {
                                const exists = current.some(cm => cm.flatNo === flat);
                                if (!exists) {
                                    current.push({
                                        id: 'm_imp_' + Date.now() + '_' + idx,
                                        name,
                                        flatNo: flat,
                                        building: String(m.building || m.Building || 'A').trim(),
                                        email: String(m.email || m.Email || `resident_${flat}@society.com`).trim(),
                                        phone: String(m.phone || m.Phone || '9876543210').trim(),
                                        status: String(m.status || m.Status || 'Owner').trim(),
                                        membersCount: parseInt(m.membersCount || m.Members || '3', 10),
                                        joinDate: new Date().toISOString().split('T')[0]
                                    });
                                    imported++;
                                }
                            }
                        });
                        saveDB(MOCK_STORAGE_KEY_MEMBERS, current);
                        showToast(`Imported ${imported} residents from Excel!`, 'success');
                        loadAdminMembers(document.getElementById('admin-main-pane'));
                    } else {
                        showToast('Sheet appears empty', 'error');
                    }
                } catch (err) {
                    showToast('Failed to import: ' + err.message, 'error');
                }
            };
            reader.readAsArrayBuffer(file);
        }

        function downloadReceiptPDF(billId) {

            const bills = getDB(MOCK_STORAGE_KEY_BILLS);
            const bill = bills.find(b => b.id === billId);
            const user = auth.getCurrentUser();

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a5' });

            // 1. BRAND HEADER
            doc.setFillColor(99, 102, 241); // Indigo
            doc.rect(0, 0, 148, 25, 'F');

            doc.setTextColor(255, 255, 255);
            doc.setFont('Helvetica', 'bold');
            doc.setFontSize(14);
            doc.text('SHITAL RESIDENCY', 10, 11);
            doc.setFontSize(7);
            doc.setFont('Helvetica', 'normal');
            doc.setTextColor(224, 231, 255);
            doc.text('REG: GDS/2026/MUM-IV | TELEPHONE: +91 99009 90099', 10, 17);

            // 2. RECEIPT METADATA
            doc.setTextColor(30, 41, 59);
            doc.setFontSize(11);
            doc.setFont('Helvetica', 'bold');
            doc.text('PAYMENT RECEIPT', 10, 36);

            doc.setDrawColor(226, 232, 240);
            doc.setLineWidth(0.3);
            doc.line(10, 39, 138, 39);

            doc.setFont('Helvetica', 'normal');
            doc.setFontSize(8);
            doc.setTextColor(148, 163, 184);
            doc.text('RECEIPT ID:', 10, 45);
            doc.setTextColor(30, 41, 59);
            doc.text(`GD-${bill.id.toUpperCase()}`, 35, 45);

            doc.setTextColor(148, 163, 184);
            doc.text(user.building ? 'RESIDENT FLAT:' : 'PLOT NO:', 10, 50);
            doc.setTextColor(30, 41, 59);
            doc.text(user.building ? `Wing ${user.building}, Flat ${user.flatNo}` : `Plot ${user.flatNo}`, 35, 50);

            doc.setTextColor(148, 163, 184);
            doc.text('RESIDENT NAME:', 10, 55);
            doc.setTextColor(30, 41, 59);
            doc.text(user.name, 35, 55);

            doc.setTextColor(148, 163, 184);
            doc.text('PAYMENT ROUTE:', 80, 45);
            doc.setTextColor(30, 41, 59);
            doc.text(bill.paymentMethod || 'Online (UPI)', 105, 45);

            doc.setTextColor(148, 163, 184);
            doc.text('TRANSACTION DATE:', 80, 50);
            doc.setTextColor(30, 41, 59);
            doc.text(bill.paymentDate || bill.dueDate, 105, 50);

            doc.line(10, 60, 138, 60);

            // 3. TABLE OF PARTICULARS
            doc.setFillColor(248, 250, 252);
            doc.rect(10, 65, 128, 6, 'F');
            doc.setFont('Helvetica', 'bold');
            doc.setTextColor(99, 102, 241);
            doc.text('PARTICULARS & LEVIES', 12, 69);
            doc.text('AMOUNT (INR)', 112, 69);

            doc.setFont('Helvetica', 'normal');
            doc.setTextColor(30, 41, 59);
            let y = 77;
            const items = [
                { label: 'Electricity Consumption (Utility)', val: bill.electricity },
                { label: 'Garbage Collection Levy', val: bill.garbage },
                { label: 'Clubhouse Maintenance Charge', val: bill.maintenance }
            ];
            if (bill.lateFee > 0) items.push({ label: 'Late Payment Fine Penalty', val: bill.lateFee });

            items.forEach(item => {
                doc.text(item.label, 12, y);
                doc.text(`Rs. ${item.val.toFixed(2)}`, 112, y);
                doc.line(10, y + 2, 138, y + 2);
                y += 7;
            });

            // TOTAL DUES
            y += 2;
            doc.setFillColor(240, 244, 255);
            doc.rect(10, y - 4, 128, 7, 'F');
            doc.setFont('Helvetica', 'bold');
            doc.setTextColor(99, 102, 241);
            doc.text('NET TRANSACTION TOTAL:', 12, y);
            doc.text(`Rs. ${bill.total.toFixed(2)}`, 112, y);

            // PAID STAMP SEAL
            const stampY = y + 8;
            doc.setDrawColor(34, 197, 94);
            doc.setLineWidth(0.5);
            doc.rect(90, stampY, 35, 12);
            doc.setFillColor(240, 253, 244);
            doc.rect(90.5, stampY + 0.5, 34, 11, 'F');
            doc.setTextColor(34, 197, 94);
            doc.setFontSize(10);
            doc.text('PAID', 103, stampY + 6);
            doc.setFontSize(5);
            doc.setFont('Helvetica', 'normal');
            doc.text(`Date: ${bill.paymentDate || 'Completed'}`, 94, stampY + 9);

            doc.save(`shital_residency_receipt_flat_${user.flatNo}_${bill.month.replace(' ', '_')}.pdf`);
            showToast('Receipt PDF downloaded successfully!', 'success');
        }

        // ==========================================
        // 10. INITIALIZATION
        // ==========================================
        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            resolveRoute();
        });
    </script>
</body>
</html>
